# Disable BLE / default split transports, use ESB
CONFIG_ZMK_BLE=n
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n
CONFIG_ZMK_SPLIT_ESB=y
CONFIG_ZMK_SPLIT_ESB_PERIPHERAL_ID=1

# ESB module hard requirements
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_MPSL_TIMESLOT_SESSION_COUNT=2
CONFIG_ESB_MAX_PAYLOAD_LENGTH=48

# Battery reporting over ESB
CONFIG_ZMK_BATTERY_REPORTING=y

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_PMW3610_ALT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n
CONFIG_ZMK_EXT_POWER=y
#CONFIG_PMW3610_ALT_SWAP_XY=y
#CONFIG_PMW3610_ALT_INVERT_X=y
#CONFIG_PMW3610_ALT_INVERT_Y=y
CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=8

#CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9
#CONFIG_BT_PERIPHERAL_PREF_LATENCY=16
#CONFIG_BT_BUF_ACL_TX_COUNT=32
#CONFIG_BT_L2CAP_TX_BUF_COUNT=32

#CONFIG_SPI_LOG_LEVEL_DBG=y

#define ZMK_POINTING_DEFAULT_MOVE_VAL 1500 
#define ZMK_POINTING_DEFAULT_SCRL_VAL 20
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=3264
#CONFIG_PMW3610_ALT_REST2_SAMPLE_TIME_MS=200
CONFIG_PMW3610_ALT_REST3_SAMPLE_TIME_MS=300
#CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=500
#CONFIG_PMW3610_ALT_REST1_DOWNSHIFT_TIME_MS=3000
#CONFIG_PMW3610_ALT_REST2_DOWNSHIFT_TIME_MS=30000

CONFIG_ZMK_SLEEP=n
#CONFIG_ZMK_BLE_MOUSE_REPORT_QUEUE_SIZE=2