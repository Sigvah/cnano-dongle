CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
#CONFIG_SPI=y
CONFIG_INPUT=y
#CONFIG_PINCTRL=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n
# PROSPECTOR config removed - module disabled for Zephyr 4.1 compatibility
#CONFIG_ZMK_BLE_PROFILE_ADVERTISING=n
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_BLE_EXPERIMENTAL_SEC=y
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_CONN_RSSI=y
CONFIG_BT_CTLR_TX_PWR_DYNAMIC_CONTROL=y
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6

# Low-latency split BLE tuning (central) - requires carrefinho/zmk sci-dev
CONFIG_BT_CTLR_ADVANCED_FEATURES=y
CONFIG_BT_CTLR_CONN_INTERVAL_LOW_LATENCY=y
CONFIG_BT_CONN_PARAM_ANY=y
CONFIG_ZMK_SPLIT_BLE_PREF_INT=3
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=400
CONFIG_BT_CTLR_ASSERT_OVERHEAD_START=n

CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=100
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
#CONFIG_ZMK_BLE_MOUSE_REPORT_QUEUE_SIZE=2

# USB stack hardening for high USB load under BLE low latency.
# Bigger thread stacks + overflow detection + non-blocking deferred logging
# so the USB CDC stack survives heavy traffic and yields a clean coredump.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_IDLE_STACK_SIZE=512
CONFIG_HW_STACK_PROTECTION=y
CONFIG_STACK_SENTINEL=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_MODE_OVERFLOW=y
CONFIG_LOG_PROCESS_THREAD_PRIORITY=10
CONFIG_USB_WORKQUEUE_STACK_SIZE=4096
CONFIG_USB_CDC_ACM_RINGBUF_SIZE=1024