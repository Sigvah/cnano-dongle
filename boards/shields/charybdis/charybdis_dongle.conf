CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
#CONFIG_SPI=y
CONFIG_INPUT=y
#CONFIG_PINCTRL=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n

# disable BLE split transport (peripherals use ESB, not BLE split)
CONFIG_ZMK_SPLIT_BLE=n

# enable ESB split transport on central
CONFIG_ZMK_SPLIT_ESB=y

# set 2: BLE (for host HID) and ESB (for peripherals) run simultaneously
CONFIG_MPSL_TIMESLOT_SESSION_COUNT=2

CONFIG_ZMK_SPLIT_ESB_PROTO_MSGQ_ITEMS=16
CONFIG_ZMK_SPLIT_ESB_EVENT_BUFFER_ITEMS=16
CONFIG_ZMK_SPLIT_ESB_CMD_BUFFER_ITEMS=4

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_ESB_MAX_PAYLOAD_LENGTH=48
CONFIG_ESB_TX_FIFO_SIZE=1
# PROSPECTOR config removed - module disabled for Zephyr 4.1 compatibility
#CONFIG_ZMK_BLE_PROFILE_ADVERTISING=n
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_BLE_EXPERIMENTAL_SEC=y
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_CONN_RSSI=y
CONFIG_BT_CTLR_TX_PWR_DYNAMIC_CONTROL=y
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6

CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=100
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
#CONFIG_ZMK_BLE_MOUSE_REPORT_QUEUE_SIZE=2