# Disable BLE / default split transports, use ESB
CONFIG_ZMK_BLE=n
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n
CONFIG_ZMK_SPLIT_ESB=y

# ESB radio settings (match kumbung01/zmk-sofle-dongle known-good)
# XTAL low-freq clock is required for TDMA timeslot sync to hold
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_ESB_MAX_PAYLOAD_LENGTH=36
CONFIG_ESB_POLLING_RATE_2KHZ=y
CONFIG_ESB_TX_RINGBUF=y
# Central RX buffering
CONFIG_ESB_RX_FIFO_SIZE=32

# USB HID stays on with BLE off
CONFIG_ZMK_USB=y

# Central dongle
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Pointing
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n

# Sleep off on dongle
CONFIG_ZMK_SLEEP=n

# Battery reporting (peripheral batteries fetched over ESB)
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Verbose ESB logging (only emitted when a logging backend is active,
# e.g. the zmk-usb-logging debug build). No effect on normal firmware.
CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_DBG=y
# Hold log output ~8s at boot so the ESB init/sync messages aren't
# flushed before a serial console is attached (matches the upstream
# kumbung01 debug config). Only relevant when logging is enabled.
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=8000
