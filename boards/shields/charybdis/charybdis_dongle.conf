# Disable BLE / default split transports, use ESB
CONFIG_ZMK_BLE=n
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n
CONFIG_ZMK_SPLIT_ESB=y

# ESB radio settings — required by kumbung01 TDMA/FHSS stack
# XTAL low-freq clock is required for TDMA timeslot sync to hold
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_ESB_MAX_PAYLOAD_LENGTH=48
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_MPSL_TIMESLOT_SESSION_COUNT=2

# USB HID stays on with BLE off
CONFIG_ZMK_USB=y

# Central dongle
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Pointing
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n

# Sleep off on dongle
CONFIG_ZMK_SLEEP=n

# Battery reporting (peripheral batteries fetched over ESB)
CONFIG_ZMK_BATTERY=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Prospector display options (only used with prospector_adapter shield)
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=100
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
